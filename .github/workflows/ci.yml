name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: gateway/go.sum

      - name: Vet
        working-directory: gateway
        run: go vet ./...

      - name: Test
        working-directory: gateway
        run: go test -race -count=1 ./...

      - name: Build
        working-directory: gateway
        run: go build -o /dev/null ./cmd/gateway

  risk-engine:
    name: Risk Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest --tb=short -q

  ai:
    name: AI Modules (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest

      - name: Test
        run: pytest --tb=short -q

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway, risk-engine, ai, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -f gateway/Dockerfile -t synapse-gateway:ci gateway/

      - name: Build risk-engine image
        run: docker build -f risk-engine/Dockerfile -t synapse-risk-engine:ci risk-engine/

      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t synapse-dashboard:ci dashboard/
