name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: gateway/go.sum

      - name: Vet
        working-directory: gateway
        run: go vet ./...

      - name: Test
        working-directory: gateway
        run: go test -race -count=1 ./...

      - name: Build
        working-directory: gateway
        run: go build -o /dev/null ./cmd/gateway

  risk-engine:
    name: Risk Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest --tb=short -q

  ai:
    name: AI Modules (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest

      - name: Test
        run: pytest --tb=short -q

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway, risk-engine, ai, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -f gateway/Dockerfile -t synapse-gateway:ci gateway/

      - name: Build risk-engine image
        run: docker build -f risk-engine/Dockerfile -t synapse-risk-engine:ci .

      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t synapse-dashboard:ci dashboard/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for gateway..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/api/v1/health; do sleep 2; done'
          echo "Waiting for risk engine..."
          timeout 120 bash -c 'until curl -sf http://localhost:8081/api/v1/health; do sleep 2; done'
          echo "Waiting for dashboard..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
