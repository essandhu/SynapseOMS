apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: synapse-oms
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: synapse-oms/gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: KAFKA_BROKERS
            - name: RISK_ENGINE_GRPC
              value: risk-engine:50051
            - name: ML_SCORER_URL
              value: http://ml-scorer:8090
            - name: SYNAPSE_MASTER_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: SYNAPSE_MASTER_PASSPHRASE
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: synapse-oms
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-config
  namespace: synapse-oms
data:
  POSTGRES_URL: "postgres://synapse:synapse@postgres:5432/synapse"
  REDIS_URL: "redis://redis:6379"
  KAFKA_BROKERS: "kafka:9092"
