apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: synapse-oms
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: synapse-oms/dashboard:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: VITE_API_URL
              value: http://gateway:8080
            - name: VITE_WS_URL
              value: ws://gateway:8080
            - name: VITE_RISK_API_URL
              value: http://risk-engine:8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: synapse-oms
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: http
      name: http
