apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: synapse-oms
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "gateway"
        static_configs:
          - targets: ["gateway:8080"]

      - job_name: "risk-engine"
        static_configs:
          - targets: ["risk-engine:8081"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: synapse-oms
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
              name: http
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: synapse-oms
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: http
      name: http
