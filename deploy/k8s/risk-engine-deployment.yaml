apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: synapse-oms
  labels:
    app: risk-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: synapse-oms/risk-engine:latest
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: KAFKA_BROKERS
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: synapse-config
                  key: REDIS_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: synapse-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  namespace: synapse-oms
spec:
  selector:
    app: risk-engine
  ports:
    - port: 8081
      targetPort: http
      name: http
    - port: 50051
      targetPort: grpc
      name: grpc
