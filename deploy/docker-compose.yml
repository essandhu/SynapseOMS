services:
  gateway:
    build: ../gateway
    ports: ["8080:8080"]
    restart: unless-stopped
    environment:
      - POSTGRES_URL=postgres://synapse:${POSTGRES_PASSWORD:-synapse}@postgres:5432/synapse
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - RISK_ENGINE_GRPC=risk-engine:50051
      - ML_SCORER_URL=http://ml-scorer:8090
      - SYNAPSE_MASTER_PASSPHRASE=${SYNAPSE_MASTER_PASSPHRASE}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build: ../dashboard
    ports: ["3000:3000"]
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080
      - VITE_RISK_API_URL=http://localhost:8081
    depends_on:
      gateway: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
      POSTGRES_DB: synapse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: synapse-oms-local-001
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  ml-scorer:
    build:
      context: ../ai
      dockerfile: Dockerfile
    ports: ["8090:8090"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  risk-engine:
    build:
      context: ../risk-engine
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "50051:50051"
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
      - POSTGRES_URL=postgresql://synapse:${POSTGRES_PASSWORD:-synapse}@postgres:5432/synapse
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Monitoring (opt-in: docker compose --profile monitoring up) ---

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: [monitoring]

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
    restart: unless-stopped
    volumes:
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/system-overview.json:/etc/grafana/provisioning/dashboards/system-overview.json
      - ./grafana/venue-performance.json:/etc/grafana/provisioning/dashboards/venue-performance.json
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-synapse}
    profiles: [monitoring]

volumes:
  pgdata:
